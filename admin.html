<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة فهرس المكتبة | تحميل وتنقية البيانات</title>
    <style>
        :root {
            --primary: #1a4a3e;
            --primary-light: #2c7a6d;
            --bg: #f5f0eb;
            --card: #ffffff;
            --text: #2c1810;
            --danger: #e74c3c;
            --warning: #f39c12;
            --info: #3498db;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Tahoma, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 16px;
            line-height: 1.6;
        }

        .card {
            background: var(--card);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            max-width: 900px;
            width: 100%;
            text-align: center;
        }

        h1 { color: var(--primary); font-size: 1.5em; margin-bottom: 8px; }
        .subtitle { color: #777; font-size: 0.9em; margin-bottom: 20px; }

        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 20px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        .tab-btn {
            padding: 8px 16px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9em;
            font-weight: bold;
            color: #888;
            border-radius: 20px;
            transition: 0.2s;
        }

        .tab-btn.active {
            background: var(--primary-light);
            color: white;
        }

        .tab-content { display: none; text-align: right; }
        .tab-content.active { display: block; }

        .status-box {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 16px;
            margin: 20px 0;
            text-align: right;
            border-right: 4px solid var(--primary-light);
        }

        .upload-area {
            border: 2px dashed #ccc;
            border-radius: 12px;
            padding: 30px 20px;
            margin: 20px 0;
            cursor: pointer;
        }

        .upload-area:hover { border-color: var(--primary-light); background: #f0faf7; }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.9em;
        }

        .btn {
            padding: 10px 18px;
            border-radius: 20px;
            border: none;
            font-family: inherit;
            font-size: 0.9em;
            font-weight: bold;
            cursor: pointer;
            margin: 5px;
            transition: 0.2s;
            display: inline-block;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:disabled { background: #aaa; cursor: not-allowed; }
        .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-warning { background: var(--warning); color: white; }
        .btn-info { background: var(--info); color: white; }

        .message {
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            font-size: 0.85em;
            display: none;
        }
        .message.success { background: #d4edda; color: #155724; display: block; }
        .message.error { background: #f8d7da; color: #721c24; display: block; }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8em;
            margin: 15px 0;
            display: block;
            overflow-x: auto;
        }

        th, td {
            border: 1px solid #eee;
            padding: 8px;
            text-align: right;
            white-space: nowrap;
        }

        th { background: #f5f5f5; }

        .duplicate-item {
            background: #fff3cd;
            padding: 12px;
            border-radius: 10px;
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .login-box { text-align: center; }
        .login-box input[type="password"] {
            width: 80%;
            padding: 12px;
            margin: 10px auto;
            text-align: center;
            letter-spacing: 3px;
        }

        @media (max-width: 600px) {
            .tabs { justify-content: center; }
            .card { padding: 15px; }
        }
    </style>
</head>
<body>

    <!-- شاشة تسجيل الدخول -->
    <div class="card login-box" id="loginScreen">
        <h1>🔐 دخول المشرف</h1>
        <p class="subtitle">أدخل كلمة المرور للوصول إلى لوحة الإدارة</p>
        <input type="password" id="passwordInput" placeholder="كلمة المرور" autocomplete="off">
        <div style="color:red;display:none;" id="wrongMsg">❌ كلمة المرور غير صحيحة</div>
        <button class="btn btn-primary" onclick="checkPassword()">دخول</button>
        <p><a href="index.html">📚 الفهرس</a></p>
    </div>

    <!-- لوحة الإدارة -->
    <div class="card" id="adminPanel" style="display:none;">
        <h1>⚙️ لوحة الإدارة</h1>
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('tabUpload')">📤 تحميل</button>
            <button class="tab-btn" onclick="switchTab('tabDuplicates')">🔄 التكرارات</button>
            <button class="tab-btn" onclick="switchTab('tabEdit')">✏️ تحرير</button>
        </div>

        <!-- تبويب التحميل -->
        <div class="tab-content active" id="tabUpload">
            <div class="status-box">
                <strong>📊 الحالة:</strong> <span id="dbStatus">...</span>
            </div>
            <div class="upload-area" id="uploadArea">
                <p><strong>📂 اسحب وأفلت ملف CSV هنا</strong></p>
                <p style="color:#888;">أو اضغط لاختيار الملف</p>
                <input type="file" id="fileInput" accept=".csv">
            </div>
            <div id="fileInfo" style="font-size:0.8em;"></div>
            <button class="btn btn-primary" id="processBtn" disabled>🔄 معالجة وتخزين</button>
            <button class="btn btn-outline" onclick="exportToCSV()">📥 تصدير CSV</button>
            <div id="uploadMessage" class="message"></div>
        </div>

        <!-- تبويب التكرارات -->
        <div class="tab-content" id="tabDuplicates">
            <h3>🔍 الكشف عن الكتب المكررة</h3>
            <p style="font-size:0.85em;color:#666;">يتم البحث عن تشابه في العنوان بنسبة 80% على الأقل.</p>
            <button class="btn btn-warning" onclick="findDuplicates()">🔎 ابحث عن التكرارات</button>
            <div id="duplicatesResult" style="margin-top:15px;"></div>
        </div>

        <!-- تبويب التحرير -->
        <div class="tab-content" id="tabEdit">
            <h3>✏️ تعديل البيانات</h3>
            <input type="text" id="editSearch" placeholder="ابحث عن كتاب لتعديله..." oninput="searchBooksToEdit()">
            <div style="max-height: 60vh; overflow-y: auto; margin-top:10px;">
                <table id="editTable">
                    <thead><tr><th>العنوان</th><th>المؤلف</th><th>ناشر</th><th>سنة</th><th>إجراءات</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const DB_NAME = 'LibraryCatalog';
        const STORE_NAME = 'books';
        const ADMIN_PASSWORD = 'Zairaf@2026'; // غيّرها هنا

        let DB;
        let allBooks = [];

        // ========== دوال القاعدة ==========
        function openDB() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open(DB_NAME, 1);
                req.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        const store = db.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
                        store.createIndex('title', 'title', { unique: false });
                        store.createIndex('category', 'category', { unique: false });
                    }
                };
                req.onsuccess = (e) => resolve(e.target.result);
                req.onerror = (e) => reject(e.target.error);
            });
        }

        async function getBooks() {
            const db = await openDB();
            return new Promise((resolve) => {
                const tx = db.transaction(STORE_NAME, 'readonly');
                const store = tx.objectStore(STORE_NAME);
                const req = store.getAll();
                req.onsuccess = () => resolve(req.result || []);
                req.onerror = () => resolve([]);
            });
        }

        async function saveBooks(books) {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                store.clear();
                books.forEach((b, i) => { b.id = i + 1; store.add(b); });
                tx.oncomplete = () => resolve(books.length);
                tx.onerror = () => reject(tx.error);
            });
        }

        async function refreshStatus() {
            const books = await getBooks();
            allBooks = books;
            document.getElementById('dbStatus').textContent = `✅ ${books.length} كتاب`;
        }

        // ========== تسجيل الدخول ==========
        function checkPassword() {
            const input = document.getElementById('passwordInput').value;
            if (input === ADMIN_PASSWORD) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                refreshStatus();
            } else {
                document.getElementById('wrongMsg').style.display = 'block';
            }
        }

        // ========== تبويبات ==========
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');
            if (tabId === 'tabDuplicates') document.getElementById('duplicatesResult').innerHTML = '';
            if (tabId === 'tabEdit') searchBooksToEdit();
        }

        // ========== تحميل CSV ==========
        document.getElementById('fileInput').addEventListener('change', function(e) {
            if (e.target.files.length > 0) {
                document.getElementById('fileInfo').textContent = `📄 ${e.target.files[0].name}`;
                document.getElementById('processBtn').disabled = false;
            }
        });

        document.getElementById('processBtn').addEventListener('click', async () => {
            const file = document.getElementById('fileInput').files[0];
            if (!file) return;
            const msg = document.getElementById('uploadMessage');
            try {
                const text = await file.text();
                const lines = text.split(/\r?\n/).filter(l => l.trim());
                const books = [];
                for (let i = 1; i < lines.length; i++) {
                    const vals = lines[i].split(',');
                    if (vals.length < 10) continue;
                    books.push({
                        title: (vals[0]||'').trim(),
                        author: (vals[1]||'').trim(),
                        investigator: (vals[2]||'بدون').trim(),
                        publisher: (vals[3]||'').trim(),
                        category: (vals[4]||'').trim(),
                        volumes: (vals[5]||'بدون').trim(),
                        edition: (vals[6]||'بدون').trim(),
                        donor: (vals[7]||'').trim(),
                        year: (vals[8]||'').trim(),
                        copies: (vals[9]||'1').trim()
                    });
                }
                await saveBooks(books);
                msg.className = 'message success';
                msg.textContent = `✅ تم تخزين ${books.length} كتاب`;
                refreshStatus();
            } catch (err) {
                msg.className = 'message error';
                msg.textContent = '❌ ' + err.message;
            }
        });

        // ========== تصدير ==========
        async function exportToCSV() {
            const books = await getBooks();
            let csv = 'عنوان الكتاب,اسم المؤلف,المحقق أو المترجم,دار النشر,الصنف,ع. المجلدات,ر. الطبعة,اسم المتبرع,سنة النشر,عدد النسخ\n';
            books.forEach(b => {
                csv += `"${b.title}","${b.author}","${b.investigator}","${b.publisher}","${b.category}","${b.volumes}","${b.edition}","${b.donor}","${b.year}","${b.copies}"\n`;
            });
            const blob = new Blob(['\ufeff' + csv], {type: 'text/csv;charset=utf-8;'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'فهرس_المكتبة_المعدل.csv';
            a.click();
        }

        // ========== كشف التكرارات ==========
        function similarity(s1, s2) {
            s1 = s1.toLowerCase().replace(/[^\w\s]/g, '');
            s2 = s2.toLowerCase().replace(/[^\w\s]/g, '');
            if (!s1 || !s2) return 0;
            const longer = s1.length > s2.length ? s1 : s2;
            const shorter = s1.length > s2.length ? s2 : s1;
            if (longer.length === 0) return 100;
            return (longer.length - editDistance(longer, shorter)) / longer.length * 100;
        }

        function editDistance(a, b) {
            const matrix = Array(b.length + 1).fill().map(() => Array(a.length + 1).fill(0));
            for (let i = 0; i <= a.length; i++) matrix[0][i] = i;
            for (let j = 0; j <= b.length; j++) matrix[j][0] = j;
            for (let j = 1; j <= b.length; j++)
                for (let i = 1; i <= a.length; i++)
                    matrix[j][i] = a.charAt(i-1) === b.charAt(j-1) ? matrix[j-1][i-1] : Math.min(matrix[j-1][i-1]+1, matrix[j][i-1]+1, matrix[j-1][i]+1);
            return matrix[b.length][a.length];
        }

        async function findDuplicates() {
            const books = await getBooks();
            const duplicates = [];
            const seen = new Set();
            for (let i = 0; i < books.length; i++) {
                if (seen.has(i)) continue;
                for (let j = i+1; j < books.length; j++) {
                    if (seen.has(j)) continue;
                    const sim = similarity(books[i].title, books[j].title);
                    if (sim >= 80) {
                        duplicates.push({book1: books[i], book2: books[j], sim: sim.toFixed(1)});
                        seen.add(i);
                        seen.add(j);
                        break;
                    }
                }
            }
            const container = document.getElementById('duplicatesResult');
            if (duplicates.length === 0) {
                container.innerHTML = '<p>✅ لا توجد تكرارات واضحة.</p>';
                return;
            }
            container.innerHTML = duplicates.map((d, idx) => `
                <div class="duplicate-item">
                    <div>
                        <strong>${d.book1.title}</strong> (${d.book1.author})<br>
                        <strong>${d.book2.title}</strong> (${d.book2.author})<br>
                        <span style="color:#e67e22;">تشابه: ${d.sim}%</span>
                    </div>
                    <button class="btn btn-danger" onclick="deleteBook(${d.book2.id})">🗑️ حذف الثاني</button>
                </div>
            `).join('');
        }

        async function deleteBook(id) {
            if (!confirm('هل أنت متأكد من حذف هذا الكتاب؟')) return;
            const books = await getBooks();
            const updated = books.filter(b => b.id !== id);
            await saveBooks(updated);
            refreshStatus();
            findDuplicates();
        }

        // ========== تحرير الكتب ==========
        async function searchBooksToEdit() {
            const term = document.getElementById('editSearch').value.toLowerCase().trim();
            const books = await getBooks();
            const filtered = term ? books.filter(b => 
                b.title.toLowerCase().includes(term) || 
                b.author.toLowerCase().includes(term) ||
                b.publisher.toLowerCase().includes(term)
            ).slice(0, 50) : books.slice(0, 50);
            
            const tbody = document.querySelector('#editTable tbody');
            tbody.innerHTML = filtered.map(b => `
                <tr>
                    <td>${b.title}</td>
                    <td>${b.author}</td>
                    <td>${b.publisher}</td>
                    <td>${b.year}</td>
                    <td>
                        <button class="btn btn-info" onclick="editBook(${b.id})">✏️ تعديل</button>
                        <button class="btn btn-outline" onclick="searchOnline('${b.title.replace(/'/g, "\\'")} ${b.author.replace(/'/g, "\\'")}')">🔍 بحث</button>
                    </td>
                </tr>
            `).join('');
        }

        function searchOnline(query) {
            window.open(`https://www.google.com/search?q=${encodeURIComponent(query)}`, '_blank');
        }

        async function editBook(id) {
            const books = await getBooks();
            const book = books.find(b => b.id === id);
            if (!book) return;
            
            const newTitle = prompt('العنوان:', book.title);
            if (newTitle === null) return;
            const newAuthor = prompt('المؤلف:', book.author);
            if (newAuthor === null) return;
            const newPub = prompt('الناشر:', book.publisher);
            if (newPub === null) return;
            const newYear = prompt('السنة:', book.year);
            if (newYear === null) return;
            
            book.title = newTitle || book.title;
            book.author = newAuthor || book.author;
            book.publisher = newPub || book.publisher;
            book.year = newYear || book.year;
            
            const updated = books.map(b => b.id === id ? book : b);
            await saveBooks(updated);
            refreshStatus();
            searchBooksToEdit();
        }

        // ========== أحداث عامة ==========
        document.getElementById('passwordInput').addEventListener('keypress', e => { if (e.key === 'Enter') checkPassword(); });
        
        // بدء الصفحة
        (async () => {
            await openDB();
            // التحقق التلقائي من الجلسة السابقة (اختياري)
            if (sessionStorage.getItem('admin') === 'true') {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                refreshStatus();
            }
        })();

        // حفظ حالة الدخول
        const origCheck = checkPassword;
        checkPassword = function() {
            origCheck();
            if (document.getElementById('adminPanel').style.display !== 'none') {
                sessionStorage.setItem('admin', 'true');
            }
        };
    </script>
</body>
</html>
